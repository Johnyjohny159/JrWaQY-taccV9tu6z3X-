<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lila Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <!-- Login screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">Lila</div>
      <h1>Admin Panel</h1>
      <p class="login-sub">Enter your GitHub credentials to manage the menu.</p>
      <form id="login-form">
        <div class="field">
          <label for="gh-owner">GitHub Username / Org</label>
          <input type="text" id="gh-owner" placeholder="e.g. fibonev" required autocomplete="off" />
        </div>
        <div class="field">
          <label for="gh-repo">Repository Name</label>
          <input type="text" id="gh-repo" placeholder="e.g. lila-restaurant" required autocomplete="off" />
        </div>
        <div class="field">
          <label for="gh-pat">Personal Access Token (PAT)</label>
          <input type="password" id="gh-pat" placeholder="github_pat_…" required autocomplete="off" />
          <span class="field-hint">Never stored in the repo — kept only in your browser session.</span>
        </div>
        <div id="login-error" class="error-msg hidden"></div>
        <button type="submit" class="btn-primary" id="login-btn">Connect</button>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">

    <aside class="sidebar">
      <div class="sidebar-logo">Lila</div>
      <nav class="sidebar-nav">
        <button class="sidebar-btn active" data-view="items">Menu Items</button>
        <button class="sidebar-btn" data-view="toppings">Toppings</button>
      </nav>
      <button class="sidebar-btn danger" id="logout-btn">Log out</button>
    </aside>

    <div class="dashboard-main">
      <header class="dash-header">
        <div>
          <h2 id="dash-title">Menu Items</h2>
          <p id="dash-subtitle" class="dash-sub"></p>
        </div>
        <button class="btn-primary" id="add-item-btn">+ Add Item</button>
      </header>

      <div class="dash-toolbar">
        <input type="search" id="admin-search" placeholder="Search items…" />
        <select id="admin-cat-filter">
          <option value="">All categories</option>
          <option>Wrap</option>
          <option>Meal</option>
          <option>Hummus Bowl</option>
          <option>Sides</option>
          <option>Salads</option>
          <option>Desserts</option>
          <option>Drinks</option>
          <option>Sauces</option>
        </select>
      </div>

      <div id="items-view">
        <table class="items-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Title</th>
              <th>Category</th>
              <th>Dietary</th>
              <th>Price</th>
              <th>Available</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="items-tbody"></tbody>
        </table>
      </div>

      <div id="toppings-view" class="hidden">
        <table class="items-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Dietary</th>
              <th>Price</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="toppings-tbody"></tbody>
        </table>
        <button class="btn-outline" id="add-topping-btn" style="margin-top:16px">+ Add Topping</button>
      </div>

      <div id="save-banner" class="save-banner hidden">
        <span id="save-msg"></span>
        <button class="btn-primary" id="save-btn">Save all changes to GitHub</button>
      </div>
    </div>
  </div>

  <!-- Item modal -->
  <div id="item-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add Item</h3>
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <form id="item-form">
        <input type="hidden" id="item-id" />
        <div class="form-row">
          <div class="field">
            <label for="f-title">Title *</label>
            <input type="text" id="f-title" required />
          </div>
          <div class="field">
            <label for="f-price">Price (€) *</label>
            <input type="number" id="f-price" step="0.5" min="0" required />
          </div>
        </div>
        <div class="field">
          <label for="f-desc">Description *</label>
          <textarea id="f-desc" rows="2" required></textarea>
        </div>
        <div class="form-row">
          <div class="field">
            <label for="f-category">Category *</label>
            <select id="f-category" required>
              <option value="">Select…</option>
              <option>Wrap</option>
              <option>Meal</option>
              <option>Hummus Bowl</option>
              <option>Sides</option>
              <option>Salads</option>
              <option>Desserts</option>
              <option>Drinks</option>
              <option>Sauces</option>
            </select>
          </div>
          <div class="field">
            <label for="f-dietary">Dietary *</label>
            <select id="f-dietary" required>
              <option value="">Select…</option>
              <option>Meat</option>
              <option>Vegetarian</option>
              <option>Vegan</option>
              <option>Gluten Free</option>
            </select>
          </div>
        </div>
        <div class="form-row checkboxes">
          <label class="checkbox-label">
            <input type="checkbox" id="f-can-vegan" />
            Can be Vegan
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="f-available" checked />
            Available
          </label>
        </div>
        <div class="field">
          <label>Image</label>
          <div class="img-upload-wrap" id="img-upload-wrap">
            <div id="img-preview" class="img-preview hidden"></div>
            <label class="btn-outline upload-label" for="f-image">
              📷 Upload photo
              <input type="file" id="f-image" accept="image/*" class="hidden" />
            </label>
            <span id="img-current" class="field-hint"></span>
          </div>
        </div>
        <div id="form-error" class="error-msg hidden"></div>
        <div class="modal-actions">
          <button type="button" class="btn-outline" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn-primary">Save Item</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Topping modal -->
  <div id="topping-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3 id="topping-modal-title">Add Topping</h3>
        <button class="modal-close" id="topping-modal-close">&times;</button>
      </div>
      <form id="topping-form">
        <input type="hidden" id="t-id" />
        <div class="field">
          <label for="t-title">Title *</label>
          <input type="text" id="t-title" required />
        </div>
        <div class="form-row">
          <div class="field">
            <label for="t-price">Price (€) *</label>
            <input type="number" id="t-price" step="0.5" min="0" required />
          </div>
          <div class="field">
            <label for="t-dietary">Dietary *</label>
            <select id="t-dietary" required>
              <option value="">Select…</option>
              <option>Meat</option>
              <option>Vegetarian</option>
              <option>Vegan</option>
            </select>
          </div>
        </div>
        <div id="topping-form-error" class="error-msg hidden"></div>
        <div class="modal-actions">
          <button type="button" class="btn-outline" id="topping-cancel">Cancel</button>
          <button type="submit" class="btn-primary">Save Topping</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete confirm -->
  <div id="confirm-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Delete Item</h3>
        <button class="modal-close" id="confirm-close">&times;</button>
      </div>
      <p id="confirm-msg" style="padding: 0 0 20px;"></p>
      <div class="modal-actions">
        <button class="btn-outline" id="confirm-cancel">Cancel</button>
        <button class="btn-danger" id="confirm-ok">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="admin.js"></script>
</body>
</html>
