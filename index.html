<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Lila Restaurant — Browse our full menu" />
  <title>Lila Restaurant — Menu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="nav">
    <span class="nav-logo">Lila</span>
    <span class="nav-tagline">Restaurant Menu</span>
  </nav>

  <section class="hero">
    <h1 class="hero-name">Lila</h1>
    <p class="hero-sub">Fresh · Authentic · Handmade</p>
    <p class="hero-allergy">Do you have any allergies? Let us know.</p>
  </section>

  <div class="filter-zone">
    <div class="search-wrap">
      <div class="search-bar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search dishes…" autocomplete="off" />
      </div>
    </div>
    <div class="category-scroll" id="category-filters" role="group" aria-label="Filter by category">
      <button class="cat-pill active" data-cat="All">All</button>
      <button class="cat-pill" data-cat="Wrap">Wraps</button>
      <button class="cat-pill" data-cat="Meal">Meals</button>
      <button class="cat-pill" data-cat="Hummus Bowl">Hummus Bowls</button>
      <button class="cat-pill" data-cat="Sides">Sides</button>
      <button class="cat-pill" data-cat="Salads">Salads</button>
      <button class="cat-pill" data-cat="Desserts">Desserts</button>
      <button class="cat-pill" data-cat="Drinks">Drinks</button>
      <button class="cat-pill" data-cat="Sauces">Sauces</button>
    </div>
    <div class="dietary-scroll" id="dietary-filters" role="group" aria-label="Filter by dietary preference">
      <button class="diet-pill active" data-diet="All">All diets</button>
      <button class="diet-pill" data-diet="Meat">🥩 Meat</button>
      <button class="diet-pill" data-diet="Vegetarian">🧀 Vegetarian</button>
      <button class="diet-pill" data-diet="Vegan">🌱 Vegan</button>
      <button class="diet-pill" data-diet="Gluten Free">🌾 Gluten Free</button>
    </div>
  </div>

  <main class="main-content" id="menu-root">
    <div class="no-results hidden" id="no-results">
      <p>🔍</p>
      <p>No dishes found</p>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-logo">Lila</div>
    <p>&copy; 2026 Lila Restaurant</p>
    <p class="footer-allergy">Do you have any allergies? Let us know.</p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
